<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book-meter - グループ詳細</title>
    <link rel="stylesheet" href="/src/css/style.css">
    <script src="/src/js/api.js" defer></script>
    <script src="/src/js/main.js" defer></script>
</head>
<body>

<header>
    <div class="logo">
        <a href="/public/index.html" style="text-decoration: none;">
            <h1>📚 Book-meter</h1>
        </a>
    </div>
    <nav class="global-nav">
        <a href="/public/index.html" class="nav-link">ホーム</a>
        <a href="/public/search-book.html" class="nav-link">本を探す</a>
        <a href="/public/search-group.html" class="nav-link">グループを探す</a>
        <a href="/public/bookshelf.html" class="nav-link">自分の本棚を見る</a>
    </nav>
    <div class="user-controls">
        <span id="header-username">読み込み中...</span>
        <button class="header-btn" onclick="logout()">ログアウト</button>
    </div>
</header>

<main id="group-detail-main" style="max-width:900px; margin:0 auto 40px; padding:20px 20px 0;">
    <p style="text-align:center; color:#999; padding:60px;">読み込み中...</p>
</main>

<!-- 進捗編集モーダル -->
<div id="edit-progress-modal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
        <span class="modal-close" onclick="closeEditProgressModal()">✕</span>
        <h3 style="margin-top:0; margin-bottom:20px;">進捗を編集する</h3>
        <div class="form-group" style="margin-bottom:15px;">
            <label>ページ範囲</label>
            <div class="progress-input-group">
                <input type="number" id="edit-start-page" placeholder="開始" min="1">
                <span>〜</span>
                <input type="number" id="edit-end-page" placeholder="終了" min="1">
                <span>ページ</span>
            </div>
        </div>
        <div class="form-group" style="margin-bottom:20px;">
            <label>メモ</label>
            <input type="text" id="edit-memo" placeholder="メモ（任意）"
                style="width:100%; padding:10px; border:1px solid #ccc; border-radius:6px; font-size:1rem; box-sizing:border-box;">
        </div>
        <button class="btn-record" style="width:100%; padding:12px; font-size:1rem;"
            onclick="submitEditProgress()">保存する</button>
    </div>
</div>

</body>
</html>
