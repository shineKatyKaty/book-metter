<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book-meter - グループを探す</title>
    <link rel="stylesheet" href="/src/css/style.css">
    <script src="/src/js/api.js" defer></script>
    <script src="/src/js/main.js" defer></script>
</head>
<body>

<header>
    <div class="logo">
        <a href="/public/index.html" style="text-decoration: none;">
            <h1>📚 Book-meter</h1>
        </a>
    </div>
    <nav class="global-nav">
        <a href="/public/index.html" class="nav-link">ホーム</a>
        <a href="/public/search-book.html" class="nav-link">本を探す</a>
        <a href="/public/search-group.html" class="nav-link">グループを探す</a>
        <a href="/public/bookshelf.html" class="nav-link">自分の本棚を見る</a>
    </nav>
    <div class="user-controls">
        <span id="header-username">読み込み中...</span>
        <button class="header-btn" onclick="logout()">ログアウト</button>
    </div>
</header>

<main>
    <section>
        <div class="section-header">
            <h2>🔍 グループを探す</h2>
        </div>

        <div class="search-box">
            <select id="search-type" style="padding:12px; border:1px solid #ccc; border-radius:6px; font-size:1rem; background:#fff;">
                <option value="name">グループ名</option>
                <option value="book">本のタイトル</option>
            </select>
            <input type="text" id="group-search-input" placeholder="キーワードを入力..."
                onkeydown="if(event.key==='Enter') runGroupSearch()">
            <button class="btn-search" onclick="runGroupSearch()">検索</button>
        </div>

        <div id="group-search-results" class="group-list"></div>
    </section>
</main>

<!-- 参加モーダル -->
<div id="join-modal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
        <span class="modal-close" onclick="closeJoinModal()">✕</span>
        <h3 id="join-modal-title" style="margin-top:0; margin-bottom:20px;"></h3>
        <div class="form-group" style="margin-bottom:20px;">
            <label>パスワード <span style="color:red;">*</span></label>
            <input type="password" id="join-password" placeholder="パスワードを入力"
                style="width:100%; padding:10px; border:1px solid #ccc; border-radius:6px;
                font-size:1rem; box-sizing:border-box;">
        </div>
        <button class="btn-record" style="width:100%; padding:12px; font-size:1rem;"
            onclick="submitJoinGroup()">参加する</button>
    </div>
</div>

</body>
</html>
