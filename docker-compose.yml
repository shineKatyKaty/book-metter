services:
  # バックエンド: FastAPI
  backend:
    build: .
    volumes:
      - .:/app
      - ./instance:/app/instance
      - ./uploads:/app/uploads
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: always

  # フロントエンド: Nginx (HTML/JS/CSSの配信)
  frontend:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./app/front:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./uploads:/usr/share/nginx/html/uploads:ro
    depends_on:
      - backend